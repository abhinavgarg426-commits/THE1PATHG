<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verse Card Generator — The Hindu Path</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+Devanagari:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold:#C9A227; --soft-gold:#F5E6C8; --midnight:#06060F; --smoke:rgba(255,255,255,0.45); --glass-border:rgba(201,162,39,0.15); --glass-strong:rgba(10,10,26,0.88); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cormorant Garamond',serif; background:var(--midnight); color:#E8E4D9; min-height:100vh; }
        .top-bar { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; justify-content:space-between; align-items:center; padding:14px 50px; background:var(--glass-strong); backdrop-filter:blur(16px); border-bottom:1px solid var(--glass-border); }
        .top-logo { font-family:'Cinzel',serif; font-size:0.7em; letter-spacing:0.3em; color:var(--gold); }
        .top-nav { display:flex; gap:24px; }
        .top-nav a { font-family:'Inter',sans-serif; font-size:0.55em; letter-spacing:0.18em; text-transform:uppercase; color:var(--smoke); text-decoration:none; transition:color 0.3s; }
        .top-nav a:hover { color:var(--soft-gold); }
        .top-nav a.active { color:var(--gold); }

        .page { padding:90px 50px 40px; max-width:1100px; margin:0 auto; }
        .page-title { font-family:'Cinzel Decorative',serif; font-size:1.6em; color:var(--gold); letter-spacing:0.1em; margin-bottom:4px; }
        .page-sub { font-style:italic; color:var(--smoke); margin-bottom:36px; font-size:1em; }

        .layout { display:grid; grid-template-columns:1fr 1.1fr; gap:36px; align-items:start; }
        .panel { border:1px solid var(--glass-border); background:var(--glass-strong); padding:28px; }

        .field { margin-bottom:14px; }
        .field label { display:block; font-family:'Inter',sans-serif; font-size:0.55em; letter-spacing:0.18em; text-transform:uppercase; color:rgba(255,255,255,0.35); margin-bottom:5px; }
        .field input, .field textarea, .field select {
            width:100%; padding:10px 14px;
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(201,162,39,0.12);
            color:#E8E4D9; font-family:'Cormorant Garamond',serif; font-size:0.95em;
            outline:none; transition:border 0.3s; resize:vertical;
        }
        .field textarea { min-height:70px; font-family:'Noto Serif Devanagari',serif; }
        .field input:focus, .field textarea:focus, .field select:focus { border-color:rgba(201,162,39,0.4); }

        .row-3 { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
        .row-3 .field { margin-bottom:0; }

        .btn-row { display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
        .btn { padding:10px 22px; border:1px solid var(--gold); background:transparent; color:var(--gold); font-family:'Inter',sans-serif; font-size:0.58em; letter-spacing:0.18em; text-transform:uppercase; cursor:pointer; transition:all 0.3s; }
        .btn:hover { background:var(--gold); color:var(--midnight); }
        .btn.primary { background:var(--gold); color:var(--midnight); }
        .btn.primary:hover { background:#E8C84A; }

        .quick-label { font-family:'Inter',sans-serif; font-size:0.55em; letter-spacing:0.15em; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-top:16px; margin-bottom:8px; }
        .quick-btns { display:flex; flex-wrap:wrap; gap:6px; }
        .quick-btns button { padding:6px 12px; font-size:0.58em; border:1px solid rgba(201,162,39,0.2); background:transparent; color:var(--smoke); cursor:pointer; transition:all 0.2s; font-family:'Cormorant Garamond',serif; }
        .quick-btns button:hover, .quick-btns button.active { border-color:var(--gold); color:var(--gold); background:rgba(201,162,39,0.06); }

        .preview-label { font-family:'Inter',sans-serif; font-size:0.55em; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:10px; display:block; }
        #previewArea { display:flex; justify-content:center; align-items:center; min-height:460px; }
        canvas { max-width:100%; border-radius:3px; box-shadow:0 16px 48px rgba(0,0,0,0.5); }
        .output-row { margin-top:14px; display:none; }
        .output-row a { font-family:'Inter',sans-serif; font-size:0.58em; letter-spacing:0.15em; text-transform:uppercase; color:var(--gold); text-decoration:none; border:1px solid rgba(201,162,39,0.25); padding:8px 16px; transition:all 0.3s; display:inline-block; }
        .output-row a:hover { background:rgba(201,162,39,0.08); border-color:var(--gold); }

        .msg { font-family:'Inter',sans-serif; font-size:0.58em; color:rgba(255,255,255,0.3); margin-top:10px; font-style:italic; }

        @media(max-width:900px) { .layout { grid-template-columns:1fr; } }
        @media(max-width:640px) { .page { padding:80px 20px 30px; } .top-bar { padding:12px 20px; } .top-nav { gap:14px; } }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-logo">THE HINDU PATH</div>
        <div class="top-nav">
            <a href="index.html">Home</a>
            <a href="gita.html">Bhagavad Gita</a>
            <a href="upanishads.html">Upanishads</a>
            <a href="shlokas.html">Shlokas</a>
            <a href="about.html">About</a>
            <a href="verse-card-generator.html" class="active">Verse Card Maker</a>
        </div>
    </div>

    <div class="page">
        <h1 class="page-title">VERSE CARD MAKER</h1>
        <p class="page-sub">Create beautiful spiritual quote cards from sacred verses</p>

        <div class="layout">
            <!-- LEFT: FORM -->
            <div class="panel">
                <div class="field">
                    <label>Chapter & Verse</label>
                    <div class="row-3">
                        <input type="number" id="ch" min="1" max="18" value="2" placeholder="Chapter">
                        <input type="number" id="vs" min="1" max="72" value="47" placeholder="Verse">
                        <button class="btn" onclick="loadVerse()">Load</button>
                    </div>
                </div>

                <div class="field">
                    <label>Sanskrit Verse</label>
                    <textarea id="sanskrit" placeholder="कर्मण्येवाधिकारस्ते मा फलेषु कदाचन..."></textarea>
                </div>

                <div class="field">
                    <label>English Translation</label>
                    <textarea id="english" placeholder="You have the right to perform your prescribed duties..."></textarea>
                </div>

                <div class="field">
                    <label>Verse Reference</label>
                    <input type="text" id="ref" value="— Bhagavad Gita 2.47" placeholder="— Bhagavad Gita 2.47">
                </div>

                <div class="field">
                    <label>Card Theme</label>
                    <select id="theme" onchange="generateCard()">
                        <option value="krishna">Krishna Gold</option>
                        <option value="ocean">Ocean Deep</option>
                        <option value="forest">Forest Green</option>
                        <option value="sunset">Sunset Amber</option>
                        <option value="violet">Violet Mystic</option>
                    </select>
                </div>

                <div class="field">
                    <label>Card Size</label>
                    <select id="size" onchange="generateCard()">
                        <option value="1080x1350">Pinterest Pin (1080 x 1350)</option>
                        <option value="1080x1080">Square (1080 x 1080)</option>
                        <option value="1080x1920">Story (1080 x 1920)</option>
                    </select>
                </div>

                <div class="btn-row">
                    <button class="btn primary" onclick="generateCard()">Generate Card</button>
                    <button class="btn" onclick="downloadCard()">Download PNG</button>
                </div>

                <div class="quick-label">Quick Select</div>
                <div class="quick-btns" id="quickBtns"></div>
                <div class="msg" id="msg"></div>
            </div>

            <!-- RIGHT: PREVIEW -->
            <div>
                <span class="preview-label">Live Preview</span>
                <div id="previewArea">
                    <canvas id="cardCanvas" width="540" height="675"></canvas>
                </div>
                <div class="output-row" id="outputRow">
                    <a href="#" id="downloadLink" download="verse-card.png">Download PNG</a>
                </div>
            </div>
        </div>
    </div>

    <script src="gita-data.js"></script>
    <script>
    // Theme color configs
    const THEMES = {
        krishna: { bg1:'#08060F', bg2:'#120A1E', gold:'#C9A227', soft:'#F5E6C8', text:'#D8D4CC', accent:'#8B6914', cardBg:'rgba(15,8,30,0.92)' },
        ocean:   { bg1:'#030C18', bg2:'#081F38', gold:'#4A9EC4', soft:'#B0D0E8', text:'#C0D8EC', accent:'#1A5276', cardBg:'rgba(8,31,56,0.92)' },
        forest:  { bg1:'#050E07', bg2:'#0C2515', gold:'#5CAD4A', soft:'#A8D8B0', text:'#C4DEC4', accent:'#1B5E20', cardBg:'rgba(12,37,21,0.92)' },
        sunset:  { bg1:'#180804', bg2:'#2C1508', gold:'#D07030', soft:'#F0C0A0', text:'#E8D0BC', accent:'#8B3A00', cardBg:'rgba(44,21,8,0.92)' },
        violet:  { bg1:'#0C0518', bg2:'#18092A', gold:'#9B6BBE', soft:'#D0B0E8', text:'#DCD0F0', accent:'#4A2070', cardBg:'rgba(24,9,42,0.92)' }
    };

    // Daily verse map
    const DAILY = ['2.47','2.20','2.48','2.56','4.34','6.30','6.6'];
    const dayIdx = new Date().getDay();
    const dailyVerse = DAILY[dayIdx] || '2.47';

    // Verses available for quick select
    const QUICK = ['2.47','2.20','2.48','2.14','2.56','4.7','4.34','6.5','6.30','9.34','11.32','18.66'];

    // Build quick select buttons
    const qb = document.getElementById('quickBtns');
    QUICK.forEach(function(v) {
        var b = document.createElement('button');
        b.textContent = v;
        b.onclick = function() { loadVerseByNum(v); highlightBtn(this); };
        if (v === dailyVerse) b.classList.add('active');
        qb.appendChild(b);
    });

    function highlightBtn(btn) {
        document.querySelectorAll('.quick-btns button').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
    }

    // Build lookup from GITA data
    var VERSES = {};
    if (typeof GITA !== 'undefined' && GITA.chapters) {
        GITA.chapters.forEach(function(ch) {
            ch.verses.forEach(function(v) {
                VERSES[v.num] = v;
            });
        });
    }

    function loadVerseByNum(num) {
        document.getElementById('ch').value = parseInt(num.split('.')[0]);
        document.getElementById('vs').value = parseInt(num.split('.')[1]);
        loadVerse();
    }

    function loadVerse() {
        var ch = parseInt(document.getElementById('ch').value) || 1;
        var vs = parseInt(document.getElementById('vs').value) || 1;
        var num = ch + '.' + vs;
        document.getElementById('ref').value = '— Bhagavad Gita ' + num;

        // Try lookup
        if (VERSES[num]) {
            document.getElementById('sanskrit').value = VERSES[num].sanskrit;
            document.getElementById('english').value = VERSES[num].translation;
        } else if (typeof GITA !== 'undefined' && GITA.chapters && GITA.chapters[ch-1]) {
            var found = null;
            GITA.chapters[ch-1].verses.forEach(function(v) {
                if (parseInt(v.num.split('.')[1]) === vs) found = v;
            });
            if (found) {
                document.getElementById('sanskrit').value = found.sanskrit;
                document.getElementById('english').value = found.translation;
            }
        }
        generateCard();
    }

    // Auto-load daily verse on page open
    window.addEventListener('load', function() {
        setTimeout(function() {
            loadVerseByNum(dailyVerse);
        }, 200);
    });

    function generateCard() {
        var canvas = document.getElementById('cardCanvas');
        var ctx = canvas.getContext('2d');
        var sizeOpt = document.getElementById('size').value;
        var parts = sizeOpt.split('x');
        var w = parseInt(parts[0]);
        var h = parseInt(parts[1]);
        canvas.width = w; canvas.height = h;

        var themeKey = document.getElementById('theme').value;
        var t = THEMES[themeKey];

        var sanskrit = document.getElementById('sanskrit').value.trim();
        var english = document.getElementById('english').value.trim();
        var ref = document.getElementById('ref').value.trim();

        // Background gradient
        var grad = ctx.createLinearGradient(0, 0, w, h);
        grad.addColorStop(0, t.bg1);
        grad.addColorStop(1, t.bg2);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);

        // Subtle border
        ctx.strokeStyle = t.gold + '22';
        ctx.lineWidth = 1;
        ctx.strokeRect(20, 20, w - 40, h - 40);

        // Top Om — large, decorative, centered
        ctx.font = 'bold 90px "Noto Serif Devanagari", serif';
        ctx.fillStyle = t.gold + '18';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('\u0965', w / 2, h * 0.18);

        // Gold line under Om
        var lineGrad = ctx.createLinearGradient(w * 0.3, 0, w * 0.7, 0);
        lineGrad.addColorStop(0, 'transparent');
        lineGrad.addColorStop(0.5, t.gold + '60');
        lineGrad.addColorStop(1, 'transparent');
        ctx.strokeStyle = lineGrad;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(w * 0.3, h * 0.24);
        ctx.lineTo(w * 0.7, h * 0.24);
        ctx.stroke();

        // Sanskrit text
        var sFontSize = Math.max(26, Math.min(38, w / 18));
        ctx.font = '500 ' + sFontSize + 'px "Noto Serif Devanagari", serif';
        ctx.fillStyle = t.soft;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';

        var padding = w * 0.1;
        var maxWidth = w - padding * 2;
        var lineHeight_s = sFontSize * 1.9;
        var sanskritLines = wrapText(ctx, sanskrit, maxWidth);
        var totalSanskritHeight = sanskritLines.length * lineHeight_s;
        var sanskritY = h * 0.30;

        sanskritLines.forEach(function(line, i) {
            ctx.fillText(line, w / 2, sanskritY + i * lineHeight_s);
        });

        // Divider line
        var divY = sanskritY + totalSanskritHeight + h * 0.04;
        var divGrad = ctx.createLinearGradient(padding, 0, w - padding, 0);
        divGrad.addColorStop(0, 'transparent');
        divGrad.addColorStop(0.3, t.gold + '40');
        divGrad.addColorStop(0.7, t.gold + '40');
        divGrad.addColorStop(1, 'transparent');
        ctx.strokeStyle = divGrad;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(padding, divY);
        ctx.lineTo(w - padding, divY);
        ctx.stroke();

        // English text
        var eFontSize = Math.max(20, Math.min(28, w / 24));
        ctx.font = '400 ' + eFontSize + 'px "Cormorant Garamond", serif';
        ctx.fillStyle = t.text;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';

        var englishLines = wrapText(ctx, english, maxWidth);
        var totalEngHeight = englishLines.length * eFontSize * 1.6;
        var engY = divY + h * 0.04;

        englishLines.forEach(function(line, i) {
            ctx.fillText(line, w / 2, engY + i * eFontSize * 1.6);
        });

        // Bottom reference
        var refY = h - h * 0.1;
        ctx.font = '600 14px "Inter", sans-serif';
        ctx.fillStyle = t.gold + '99';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(ref, w / 2, refY);

        // Bottom Om
        ctx.font = '50px "Noto Serif Devanagari", serif';
        ctx.fillStyle = t.gold + '30';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('\u0965', w / 2, h - h * 0.04);

        // Show output row
        document.getElementById('outputRow').style.display = 'block';

        // Update download link
        var dataURL = canvas.toDataURL('image/png');
        document.getElementById('downloadLink').href = dataURL;

        // Show loaded verse number in message
        document.getElementById('msg').textContent = '';
    }

    function wrapText(ctx, text, maxWidth) {
        var words = text.split(' ');
        var lines = [];
        var current = '';
        words.forEach(function(word) {
            var test = current ? current + ' ' + word : word;
            if (ctx.measureText(test).width > maxWidth && current) {
                lines.push(current);
                current = word;
            } else {
                current = test;
            }
        });
        if (current) lines.push(current);
        return lines.length ? lines : [''];
    }

    function downloadCard() {
        var canvas = document.getElementById('cardCanvas');
        var link = document.createElement('a');
        link.download = 'verse-card.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    // Theme change listener
    document.getElementById('theme').addEventListener('change', generateCard);
    </script>
</body>
</html>
