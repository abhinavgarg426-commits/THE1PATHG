<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upanishads — The 1 Path</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --midnight: #080810; --deep-blue: #0D1525; --sacred-gold: #C9A227; --soft-gold: #F5E6C8; --moonlight: #E8E4D9; --smoke: rgba(255,255,255,0.5); --border: rgba(201,162,39,0.12); }
        html { scroll-behavior: smooth; }
        body { font-family: 'Cormorant Garamond', serif; background: var(--midnight); color: var(--moonlight); line-height: 1.8; overflow-x: hidden; }
        .ambient-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; background: radial-gradient(ellipse at 20% 10%, rgba(201,162,39,0.04) 0%, transparent 50%), radial-gradient(ellipse at 80% 90%, rgba(139,38,53,0.03) 0%, transparent 50%); }
        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 22px 80px; transition: all 0.5s ease; }
        nav.scrolled { background: rgba(8,8,16,0.97); backdrop-filter: blur(20px); padding: 14px 80px; border-bottom: 1px solid var(--border); }
        .nav-logo { font-family: 'Cinzel', serif; font-size: 0.95em; font-weight: 600; letter-spacing: 0.35em; color: var(--sacred-gold); }
        .nav-links { display: flex; gap: 40px; }
        .nav-links a { font-family: 'Inter', sans-serif; font-size: 0.65em; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: var(--smoke); text-decoration: none; transition: color 0.3s; position: relative; }
        .nav-links a:hover { color: var(--soft-gold); }
        .nav-links a::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 1px; background: var(--sacred-gold); transition: width 0.3s; }
        .nav-links a:hover::after { width: 100%; }
        .nav-links a.active { color: var(--sacred-gold); }
        .nav-links a.active::after { width: 100%; }
        .page-hero { min-height: 45vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 120px 40px 60px; position: relative; z-index: 1; }
        .page-hero-om { font-family: 'Cinzel', serif; font-size: 0.9em; letter-spacing: 0.8em; color: var(--sacred-gold); margin-bottom: 30px; opacity: 0.6; }
        .page-hero h1 { font-family: 'Cinzel', serif; font-size: clamp(2em, 4vw, 3.5em); font-weight: 400; letter-spacing: 0.2em; color: var(--soft-gold); margin-bottom: 12px; }
        .page-hero-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1em; color: var(--smoke); max-width: 550px; }
        .page-hero-line { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, var(--sacred-gold), transparent); margin: 30px auto 0; }
        section { position: relative; z-index: 1; padding: 60px 80px 100px; }
        .upanishad-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; max-width: 1100px; margin: 0 auto 60px; }
        .up-card { border: 1px solid var(--border); padding: 35px 30px; transition: all 0.4s ease; cursor: pointer; }
        .up-card:hover { border-color: rgba(201,162,39,0.3); background: rgba(201,162,39,0.02); }
        .up-card.active { border-color: var(--sacred-gold); background: rgba(201,162,39,0.04); }
        .up-card-num { font-family: 'Inter', sans-serif; font-size: 0.6em; letter-spacing: 0.3em; text-transform: uppercase; color: var(--sacred-gold); margin-bottom: 10px; }
        .up-card h3 { font-family: 'Cinzel', serif; font-size: 1em; letter-spacing: 0.12em; color: var(--soft-gold); margin-bottom: 8px; }
        .up-card p { font-size: 0.9em; color: rgba(255,255,255,0.4); font-style: italic; }
        .up-detail { display: none; max-width: 900px; margin: 0 auto; }
        .up-detail.active { display: block; }
        .up-header { text-align: center; padding: 40px; margin-bottom: 50px; border-bottom: 1px solid var(--border); }
        .up-header h2 { font-family: 'Cinzel', serif; font-size: 1.4em; letter-spacing: 0.15em; color: var(--soft-gold); margin-bottom: 8px; }
        .up-header p { font-style: italic; color: rgba(255,255,255,0.4); font-size: 1em; }
        .verse-block { padding: 35px 0; border-bottom: 1px solid rgba(201,162,39,0.08); }
        .verse-block:last-child { border-bottom: none; }
        .verse-mantra { font-family: 'Cormorant Garamond', serif; font-size: 1.15em; color: var(--soft-gold); margin-bottom: 10px; line-height: 1.9; font-style: italic; }
        .verse-translit { font-family: 'Cormorant Garamond', serif; font-size: 0.88em; color: rgba(255,255,255,0.38); margin-bottom: 14px; font-style: italic; }
        .verse-meaning { font-family: 'Cormorant Garamond', serif; font-size: 1.05em; color: var(--moonlight); }
        .verse-ref { font-family: 'Inter', sans-serif; font-size: 0.6em; letter-spacing: 0.2em; text-transform: uppercase; color: var(--sacred-gold); margin-top: 12px; }
        footer { position: relative; z-index: 1; padding: 60px 80px; text-align: center; border-top: 1px solid var(--border); }
        .footer-logo { font-family: 'Cinzel', serif; font-size: 1.2em; letter-spacing: 0.4em; color: var(--sacred-gold); margin-bottom: 12px; }
        footer p { font-family: 'Inter', sans-serif; font-size: 0.65em; letter-spacing: 0.1em; color: rgba(255,255,255,0.25); }
        @media (max-width: 1024px) { .upanishad-grid { grid-template-columns: 1fr; } nav { padding: 16px 30px; } section { padding: 50px 30px 80px; } }
        @media (max-width: 640px) { .nav-links { display: none; } }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>
    <nav id="navbar">
        <div class="nav-logo">THE 1 PATH</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="gita.html">Bhagavad Gita</a>
            <a href="upanishads.html" class="active">Upanishads</a>
            <a href="shlokas.html">Shlokas</a>
        </div>
    </nav>
    <div class="page-hero">
        <div class="page-hero-om">ॐ</div>
        <h1>UPANISHADS</h1>
        <p class="page-hero-sub">The end of knowledge — where the seeker discovers the identity of the soul and the absolute. Vedanta's supreme revelation.</p>
        <div class="page-hero-line"></div>
    </div>
    <section>
        <div class="upanishad-grid" id="upGrid"></div>
        <div id="upDetails"></div>
    </section>
    <footer>
        <div class="footer-logo">THE 1 PATH</div>
        <p>Principal Upanishads · Vedantic Wisdom · The End of All Knowledge</p>
    </footer>
    <script src="upanishad-data.js"></script>
    <script>
        function renderUpanishads() {
            const grid = document.getElementById('upGrid');
            grid.innerHTML = UPANISHADS.map((u, i) =>
                `<div class="up-card${i === 0 ? ' active' : ''}" onclick="showUp(${i})">
                    <div class="up-card-num">${u.name}</div>
                    <h3>${u.sanskrit_name}</h3>
                    <p>${u.subtitle}</p>
                </div>`
            ).join('');
            
            const details = document.getElementById('upDetails');
            details.innerHTML = UPANISHADS.map((u, i) =>
                `<div class="up-detail${i === 0 ? ' active' : ''}" id="upd-${i}">
                    <div class="up-header">
                        <h2>${u.name}</h2>
                        <p>${u.subtitle} · ${u.verses.length} verses</p>
                    </div>
                    ${u.verses.map(v => `
                        <div class="verse-block">
                            <div class="verse-mantra">${v.sanskrit}</div>
                            <div class="verse-translit">${v.translit}</div>
                            <div class="verse-meaning">${v.translation}</div>
                            <div class="verse-ref">${v.ref}</div>
                        </div>
                    `).join('')}
                </div>`
            ).join('');
        }
        function showUp(idx) {
            document.querySelectorAll('.up-card').forEach((c, i) => c.classList.toggle('active', i === idx));
            document.querySelectorAll('.up-detail').forEach(d => d.classList.remove('active'));
            const el = document.getElementById('upd-' + idx);
            el.classList.add('active');
            el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        window.addEventListener('scroll', () => { document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40); });
        renderUpanishads();
    </script>
</body>
</html>
