<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verse Card Generator — The 1 Path</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+Devanagari:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold:#C9A227; --soft-gold:#F5E6C8; --midnight:#06060F; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cormorant Garamond',serif; background:var(--midnight); color:#E8E4D9; min-height:100vh; padding:40px; }
        .container { max-width:1000px; margin:0 auto; }
        h1 { font-family:'Cinzel Decorative',serif; font-size:1.5em; color:var(--gold); letter-spacing:0.15em; text-align:center; margin-bottom:8px; }
        .subtitle { text-align:center; color:rgba(255,255,255,0.4); font-style:italic; margin-bottom:40px; font-size:0.95em; }
        .layout { display:grid; grid-template-columns:1fr 1fr; gap:40px; align-items:start; }
        .panel { border:1px solid rgba(201,162,39,0.15); background:rgba(10,10,26,0.8); padding:30px; }
        .panel h2 { font-family:'Cinzel',serif; font-size:0.65em; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); margin-bottom:20px; }
        .field { margin-bottom:18px; }
        .field label { display:block; font-family:'Inter',sans-serif; font-size:0.6em; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:6px; }
        .field input, .field textarea, .field select { width:100%; padding:10px 14px; background:rgba(255,255,255,0.04); border:1px solid rgba(201,162,39,0.15); color:#E8E4D9; font-family:'Cormorant Garamond',serif; font-size:0.95em; outline:none; transition:border 0.3s; }
        .field input:focus, .field textarea:focus { border-color:rgba(201,162,39,0.5); }
        .field textarea { resize:vertical; min-height:80px; font-family:'Noto Serif Devanagari',serif; }
        .btn-row { display:flex; gap:10px; margin-top:20px; }
        button { padding:10px 24px; border:1px solid var(--gold); background:transparent; color:var(--gold); font-family:'Inter',sans-serif; font-size:0.65em; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; transition:all 0.3s; }
        button:hover { background:var(--gold); color:var(--midnight); }
        button.primary { background:var(--gold); color:var(--midnight); }
        button.primary:hover { background:#E8C84A; }
        .preview-label { font-family:'Inter',sans-serif; font-size:0.6em; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:10px; display:block; }
        #previewArea { display:flex; justify-content:center; align-items:center; min-height:400px; }
        canvas { max-width:100%; border-radius:4px; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
        .output-links { margin-top:20px; display:flex; gap:10px; flex-wrap:wrap; }
        .output-links a { font-family:'Inter',sans-serif; font-size:0.6em; letter-spacing:0.15em; text-transform:uppercase; color:var(--gold); text-decoration:none; border:1px solid rgba(201,162,39,0.3); padding:8px 16px; transition:all 0.3s; }
        .output-links a:hover { background:rgba(201,162,39,0.1); border-color:var(--gold); }
        .tip { font-family:'Inter',sans-serif; font-size:0.6em; color:rgba(255,255,255,0.3); margin-top:8px; font-style:italic; }
        @media(max-width:768px) { .layout { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>✦ VERSE CARD GENERATOR ✦</h1>
        <p class="subtitle">Create beautiful Pinterest & Instagram quote cards from Bhagavad Gita verses</p>

        <div class="layout">
            <!-- LEFT: CONTROLS -->
            <div class="panel">
                <h2>Verse Details</h2>

                <div class="field">
                    <label>Sanskrit Verse</label>
                    <textarea id="sanskrit" placeholder="कर्मण्येवाधिकारस्ते मा फलेषु कदाचन। मा कर्मफलहेतुर्भूर्मा ते सङ्गोऽस्त्वकर्मणि॥">कर्मण्येवाधिकारस्ते मा फलेषु कदाचन। मा कर्मफलहेतुर्भूर्मा ते सङ्गोऽस्त्वकर्मणि॥</textarea>
                </div>

                <div class="field">
                    <label>Transliteration (optional)</label>
                    <input type="text" id="translit" placeholder="Karmany evadhikaras te ma phaleshu kadachana...">
                </div>

                <div class="field">
                    <label>English Translation</label>
                    <textarea id="english">You have the right to perform your prescribed duties, but you are not entitled to the fruits of your actions.</textarea>
                </div>

                <div class="field">
                    <label>Verse Reference</label>
                    <input type="text" id="ref" value="— Bhagavad Gita 2.47">
                </div>

                <div class="field">
                    <label>Card Theme</label>
                    <select id="theme">
                        <option value="krishna">Krishna Gold (default)</option>
                        <option value="ocean">Ocean Deep Blue</option>
                        <option value="forest">Forest Emerald</option>
                        <option value="sunset">Sunset Amber</option>
                        <option value="violet">Violet Mystic</option>
                    </select>
                </div>

                <div class="field">
                    <label>Card Size</label>
                    <select id="size">
                        <option value="1080x1350">Pinterest Pin (1080×1350)</option>
                        <option value="1080x1080">Square Instagram (1080×1080)</option>
                        <option value="1080x1920">Story/Reel (1080×1920)</option>
                    </select>
                </div>

                <div class="btn-row">
                    <button class="primary" onclick="generateCard()">Generate Card</button>
                    <button onclick="downloadCard()">Download PNG</button>
                </div>
                <p class="tip">Tip: Pinterest pins at 1080×1350 get the highest engagement</p>
            </div>

            <!-- RIGHT: PREVIEW -->
            <div>
                <span class="preview-label">Live Preview</span>
                <div id="previewArea"><canvas id="cardCanvas" width="540" height="675"></canvas></div>
                <div class="output-links" id="outputLinks" style="display:none;">
                    <a href="#" id="downloadLink" download="gita-verse-card.png">⬇ Download PNG</a>
                    <a href="#" id="copyLink" onclick="copyToClipboard()">📋 Copy to Clipboard</a>
                </div>
            </div>
        </div>
    </div>

    <script>
    const THEMES = {
        krishna: { bg1:'#0A0614', bg2:'#1A0F2E', gold:'#C9A227', soft:'#F5E6C8', text:'#E8E4D9', accent:'#8B6914', cardBg:'rgba(20,10,40,0.85)' },
        ocean:   { bg1:'#030E1A', bg2:'#0A2342', gold:'#4A9EC4', soft:'#B8D4E8', text:'#C8DFF0', accent:'#1A5276', cardBg:'rgba(10,35,66,0.85)' },
        forest:  { bg1:'#030A05', bg2:'#0D2618', gold:'#4CAF50', soft:'#A8D5B8', text:'#C8E6C8', accent:'#1B5E20', cardBg:'rgba(13,38,24,0.85)' },
        sunset:  { bg1:'#1A0905', bg2:'#2D1810', gold:'#E87C3E', soft:'#F5C8A8', text:'#F0D8C8', accent:'#A04000', cardBg:'rgba(45,24,16,0.85)' },
        violet:  { bg1:'#0F051A', bg2:'#1A0A2E', gold:'#9B59B6', soft:'#D8B8E8', text:'#E0D0F0', accent:'#5B2C6F', cardBg:'rgba(26,10,46,0.85)' }
    };

    function generateCard() {
        const canvas = document.getElementById('cardCanvas');
        const ctx = canvas.getContext('2d');
        const themeKey = document.getElementById('theme').value;
        const sizeOpt = document.getElementById('size').value;
        const [w, h] = sizeOpt.split('x').map(Number);
        canvas.width = w; canvas.height = h;

        const t = THEMES[themeKey];
        const sanskrit = document.getElementById('sanskrit').value.trim();
        const english = document.getElementById('english').value.trim();
        const ref = document.getElementById('ref').value.trim();
        const translit = document.getElementById('translit').value.trim();

        // Background gradient
        const grad = ctx.createLinearGradient(0, 0, w, h);
        grad.addColorStop(0, t.bg1);
        grad.addColorStop(1, t.bg2);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);

        // Decorative corner accents
        ctx.strokeStyle = t.gold + '40';
        ctx.lineWidth = 1;
        // Top left
        ctx.beginPath(); ctx.moveTo(20,60); ctx.lineTo(20,20); ctx.lineTo(60,20); ctx.stroke();
        // Bottom right
        ctx.beginPath(); ctx.moveTo(w-20, h-60); ctx.lineTo(w-20, h-20); ctx.lineTo(w-60, h-20); ctx.stroke();

        // Top decorative line
        const lineGrad = ctx.createLinearGradient(w*0.2, 0, w*0.8, 0);
        lineGrad.addColorStop(0, 'transparent');
        lineGrad.addColorStop(0.5, t.gold + '60');
        lineGrad.addColorStop(1, 'transparent');
        ctx.strokeStyle = lineGrad;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(w*0.15, 60); ctx.lineTo(w*0.85, 60); ctx.stroke();

        // Om symbol
        ctx.fillStyle = t.gold + '25';
        ctx.font = `bold ${Math.round(w*0.5)}px 'Noto Serif Devanagari', serif`;
        ctx.textAlign = 'center';
        ctx.fillText('ॐ', w/2, h*0.28);

        // Sanskrit
        ctx.fillStyle = t.soft;
        ctx.font = `500 ${Math.round(w*0.055)}px 'Noto Serif Devanagari', serif`;
        ctx.textAlign = 'center';
        const lines = wrapText(ctx, sanskrit, w*0.82);
        let y = h*0.32;
        lines.forEach(l => { ctx.fillText(l, w/2, y); y += ctx.measureText(l).actualBoundingBoxDescent + w*0.055; });

        // Divider
        const dvY = Math.min(y + h*0.03, h*0.57);
        ctx.strokeStyle = t.gold + '50';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(w*0.3, dvY); ctx.lineTo(w*0.7, dvY); ctx.stroke();
        // Diamond
        ctx.fillStyle = t.gold;
        ctx.beginPath(); ctx.arc(w/2, dvY, 4, 0, Math.PI*2); ctx.fill();

        // English
        ctx.fillStyle = t.text;
        ctx.font = `400 ${Math.round(w*0.042)}px 'Cormorant Garamond', serif`;
        const engLines = wrapText(ctx, english, w*0.82);
        y = dvY + h*0.05;
        engLines.forEach(l => { ctx.fillText(l, w/2, y); y += w*0.055; });

        // Reference
        ctx.fillStyle = t.gold;
        ctx.font = `600 ${Math.round(w*0.035)}px 'Cinzel', serif`;
        ctx.fillText(ref, w/2, h*0.88);

        // Bottom line
        ctx.strokeStyle = t.gold + '40';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(w*0.15, h-60); ctx.lineTo(w*0.85, h-60); ctx.stroke();

        // Logo watermark
        ctx.fillStyle = t.gold + '30';
        ctx.font = `600 ${Math.round(w*0.028)}px 'Cinzel', serif`;
        ctx.fillText('THE 1 PATH', w/2, h - 30);

        // Update download link
        document.getElementById('outputLinks').style.display = 'flex';
        document.getElementById('downloadLink').href = canvas.toDataURL('image/png');
    }

    function wrapText(ctx, text, maxWidth) {
        const words = text.split(' ');
        const lines = [];
        let current = '';
        words.forEach(word => {
            const test = current ? current + ' ' + word : word;
            if (ctx.measureText(test).width > maxWidth && current) {
                lines.push(current); current = word;
            } else { current = test; }
        });
        if (current) lines.push(current);
        return lines;
    }

    function downloadCard() {
        const link = document.getElementById('downloadLink');
        link.click();
    }

    function copyToClipboard() {
        const canvas = document.getElementById('cardCanvas');
        canvas.toBlob(blob => {
            navigator.clipboard.write([
                new ClipboardItem({ 'image/png': blob })
            ]).then(() => alert('Card copied to clipboard!')).catch(() => alert('Copy not supported — use Download instead.'));
        });
    }

    // Generate initial card on load
    generateCard();
    </script>
</body>
</html>
