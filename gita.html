<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhagavad Gita — The 1 Path</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --midnight: #080810; --deep-blue: #0D1525; --sacred-gold: #C9A227;
            --warm-gold: #D4AF37; --soft-gold: #F5E6C8; --divine-rose: #8B2635;
            --moonlight: #E8E4D9; --smoke: rgba(255,255,255,0.5); --border: rgba(201,162,39,0.12);
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Cormorant Garamond', serif; background: var(--midnight);
            color: var(--moonlight); line-height: 1.8; overflow-x: hidden;
        }
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background: radial-gradient(ellipse at 20% 10%, rgba(201,162,39,0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 90%, rgba(139,38,53,0.03) 0%, transparent 50%);
        }
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 22px 80px; transition: all 0.5s ease;
        }
        nav.scrolled {
            background: rgba(8,8,16,0.97); backdrop-filter: blur(20px);
            padding: 14px 80px; border-bottom: 1px solid var(--border);
        }
        .nav-logo { font-family: 'Cinzel', serif; font-size: 0.95em; font-weight: 600; letter-spacing: 0.35em; color: var(--sacred-gold); }
        .nav-links { display: flex; gap: 40px; }
        .nav-links a {
            font-family: 'Inter', sans-serif; font-size: 0.65em; font-weight: 400;
            letter-spacing: 0.2em; text-transform: uppercase; color: var(--smoke);
            text-decoration: none; transition: color 0.3s; position: relative;
        }
        .nav-links a:hover { color: var(--soft-gold); }
        .nav-links a::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 1px; background: var(--sacred-gold); transition: width 0.3s; }
        .nav-links a:hover::after { width: 100%; }
        .nav-links a.active { color: var(--sacred-gold); }
        .nav-links a.active::after { width: 100%; }
        
        .page-hero {
            min-height: 45vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 120px 40px 60px; position: relative; z-index: 1;
        }
        .page-hero-om { font-family: 'Cinzel', serif; font-size: 0.9em; letter-spacing: 0.8em; color: var(--sacred-gold); margin-bottom: 30px; opacity: 0.6; }
        .page-hero h1 { font-family: 'Cinzel', serif; font-size: clamp(2em, 4vw, 3.5em); font-weight: 400; letter-spacing: 0.2em; color: var(--soft-gold); margin-bottom: 12px; }
        .page-hero-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1em; color: var(--smoke); max-width: 550px; }
        .page-hero-line { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, var(--sacred-gold), transparent); margin: 30px auto 0; }
        
        section { position: relative; z-index: 1; padding: 60px 80px 100px; }
        
        /* Chapter Navigation */
        .chapter-nav {
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px;
            max-width: 1000px; margin: 0 auto 60px;
        }
        .chapter-btn {
            font-family: 'Cinzel', serif; font-size: 0.75em; letter-spacing: 0.1em;
            padding: 14px 8px; border: 1px solid var(--border); background: transparent;
            color: var(--smoke); cursor: pointer; transition: all 0.3s; text-decoration: none;
            display: block; text-align: center;
        }
        .chapter-btn:hover, .chapter-btn.active {
            border-color: var(--sacred-gold); background: rgba(201,162,39,0.08);
            color: var(--sacred-gold);
        }
        .chapter-btn span { display: block; font-family: 'Inter', sans-serif; font-size: 0.6em; opacity: 0.5; margin-top: 3px; }
        
        /* Chapter Content */
        .chapter-content { display: none; max-width: 900px; margin: 0 auto; }
        .chapter-content.active { display: block; }
        .chapter-intro {
            text-align: center; padding: 40px; margin-bottom: 50px;
            border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
        }
        .chapter-intro h2 {
            font-family: 'Cinzel', serif; font-size: 0.7em; letter-spacing: 0.4em;
            text-transform: uppercase; color: var(--sacred-gold); margin-bottom: 10px;
        }
        .chapter-intro p { font-style: italic; color: rgba(255,255,255,0.4); font-size: 0.95em; }
        
        /* Verse Display */
        .verse-block {
            padding: 35px 0; border-bottom: 1px solid rgba(201,162,39,0.08);
        }
        .verse-block:last-child { border-bottom: none; }
        .verse-num {
            font-family: 'Inter', sans-serif; font-size: 0.6em; letter-spacing: 0.3em;
            text-transform: uppercase; color: var(--sacred-gold); margin-bottom: 10px;
        }
        .verse-sanskrit {
            font-family: 'Cormorant Garamond', serif; font-size: 1.15em; color: var(--soft-gold);
            margin-bottom: 10px; line-height: 1.9; font-style: italic;
        }
        .verse-translit {
            font-family: 'Cormorant Garamond', serif; font-size: 0.9em; color: rgba(255,255,255,0.4);
            margin-bottom: 14px; font-style: italic;
        }
        .verse-meaning {
            font-family: 'Cormorant Garamond', serif; font-size: 1.05em; color: var(--moonlight);
            line-height: 1.8;
        }
        
        footer {
            position: relative; z-index: 1; padding: 60px 80px; text-align: center;
            border-top: 1px solid var(--border);
        }
        .footer-logo { font-family: 'Cinzel', serif; font-size: 1.2em; letter-spacing: 0.4em; color: var(--sacred-gold); margin-bottom: 12px; }
        footer p { font-family: 'Inter', sans-serif; font-size: 0.65em; letter-spacing: 0.1em; color: rgba(255,255,255,0.25); }
        
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s ease; }
        .reveal.visible { opacity: 1; transform: translateY(0); }
        
        @media (max-width: 1024px) {
            .chapter-nav { grid-template-columns: repeat(3, 1fr); }
            nav { padding: 16px 30px; }
            section { padding: 50px 30px 80px; }
        }
        @media (max-width: 640px) {
            .chapter-nav { grid-template-columns: repeat(2, 1fr); }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>
    
    <nav id="navbar">
        <div class="nav-logo">THE 1 PATH</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="gita.html" class="active">Bhagavad Gita</a>
            <a href="upanishads.html">Upanishads</a>
            <a href="shlokas.html">Shlokas</a>
        </div>
    </nav>
    
    <div class="page-hero">
        <div class="page-hero-om">ॐ</div>
        <h1>BHAGAVAD GITA</h1>
        <p class="page-hero-sub">The Song of the Divine — 18 chapters revealing the path of action, devotion, knowledge, and surrender</p>
        <div class="page-hero-line"></div>
    </div>
    
    <section>
        <!-- Chapter Quick Nav -->
        <div class="chapter-nav" id="chapterNav"></div>
        
        <!-- Chapters loaded by JS -->
        <div id="chapters-container"></div>
    </section>
    
    <footer>
        <div class="footer-logo">THE 1 PATH</div>
        <p>Bhagavad Gita · 18 Chapters · 700 Verses · The Eternal Song of the Divine</p>
    </footer>
    
    <script src="gita-data.js"></script>
    <script>
        function renderChapterNav() {
            const nav = document.getElementById('chapterNav');
            nav.innerHTML = GITA.chapters.map((ch, i) =>
                `<button class="chapter-btn${i === 0 ? ' active' : ''}" onclick="showChapter(${i})">
                    Ch ${i+1}<span>${ch.name.split(' ')[0]}</span>
                </button>`
            ).join('');
        }
        
        function showChapter(idx) {
            document.querySelectorAll('.chapter-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
            document.querySelectorAll('.chapter-content').forEach(c => c.classList.remove('active'));
            const el = document.getElementById('ch-' + idx);
            el.classList.add('active');
            el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        
        function renderChapters() {
            const container = document.getElementById('chapters-container');
            container.innerHTML = GITA.chapters.map((ch, ci) => `
                <div class="chapter-content${ci === 0 ? ' active' : ''}" id="ch-${ci}">
                    <div class="chapter-intro">
                        <h2>Chapter ${ci+1} — ${ch.name}</h2>
                        <p>${ch.theme}</p>
                    </div>
                    ${ch.verses.map((v, vi) => `
                        <div class="verse-block reveal">
                            <div class="verse-num">Verse ${v.num}</div>
                            <div class="verse-sanskrit">${v.sanskrit}</div>
                            <div class="verse-translit">${v.translit}</div>
                            <div class="verse-meaning">${v.translation}</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
            
            // Observe reveals
            document.querySelectorAll('.reveal').forEach(el => {
                setTimeout(() => {
                    const obs = new IntersectionObserver((entries) => {
                        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
                    }, { threshold: 0.05 });
                    obs.observe(el);
                }, 100);
            });
        }
        
        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
        });
        
        renderChapterNav();
        renderChapters();
    </script>
</body>
</html>
